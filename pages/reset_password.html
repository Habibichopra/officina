<!DOCTYPE html>
<html lang="it">
<head><meta charset="UTF-8"><title>Reset password</title></head>
<body>
<h1>Reset password</h1>

<div id="formRichiesta">
    <p>Inserisci la tua email per ricevere il link di reset.</p>
    <input type="email" id="mailInput" placeholder="Email"><br><br>
    <button onclick="richiediReset()">Invia email di reset</button>
</div>

<div id="formReset" style="display:none;">
    <p>Inserisci la nuova password.</p>
    <input type="password" id="newPasswordInput"     placeholder="Nuova password"><br><br>
    <input type="password" id="confermaPasswordInput" placeholder="Conferma password"><br><br>
    <button onclick="resetPassword()">Reimposta password</button>
</div>

<br>
<a href="login_cliente.html">Torna al login</a>

<script src="../js/resetPassword.js"></script>
</body>
</html>
